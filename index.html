<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* display area */
    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px 16px 14px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .history {
      font-size: 0.78rem;
      color: #7ca3c8;
      min-height: 18px;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .display .current {
      font-size: 2.2rem;
      font-weight: 600;
      color: #e0e0e0;
      word-break: break-all;
      line-height: 1.1;
    }

    /* button grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px 10px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:active {
      transform: scale(0.94);
    }

    /* number buttons */
    .btn-num {
      background: #1a3a5c;
      color: #e0e0e0;
    }

    .btn-num:hover {
      background: #1f4a75;
    }

    /* operator buttons */
    .btn-op {
      background: #0f3460;
      color: #53a8ff;
    }

    .btn-op:hover {
      background: #174070;
    }

    /* equals button */
    .btn-eq {
      background: #53a8ff;
      color: #0f1b2d;
      grid-column: span 2;
    }

    .btn-eq:hover {
      background: #72baff;
    }

    /* clear / special buttons */
    .btn-clear {
      background: #3a1c1c;
      color: #ff6b6b;
    }

    .btn-clear:hover {
      background: #4d2020;
    }

    .btn-special {
      background: #1e2d3d;
      color: #a0b4c8;
    }

    .btn-special:hover {
      background: #263d52;
    }

    /* zero spans 2 columns */
    .btn-zero {
      grid-column: span 2;
      text-align: left;
      padding-left: 22px;
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="history" id="history"></div>
    <div class="current" id="current">0</div>
  </div>

  <div class="buttons">
    <!-- row 1 -->
    <button class="btn-clear" onclick="clearAll()">AC</button>
    <button class="btn-special" onclick="toggleSign()">+/-</button>
    <button class="btn-special" onclick="percent()">%</button>
    <button class="btn-op" onclick="chooseOp('/')">÷</button>

    <!-- row 2 -->
    <button class="btn-num" onclick="appendNum('7')">7</button>
    <button class="btn-num" onclick="appendNum('8')">8</button>
    <button class="btn-num" onclick="appendNum('9')">9</button>
    <button class="btn-op" onclick="chooseOp('*')">×</button>

    <!-- row 3 -->
    <button class="btn-num" onclick="appendNum('4')">4</button>
    <button class="btn-num" onclick="appendNum('5')">5</button>
    <button class="btn-num" onclick="appendNum('6')">6</button>
    <button class="btn-op" onclick="chooseOp('-')">−</button>

    <!-- row 4 -->
    <button class="btn-num" onclick="appendNum('1')">1</button>
    <button class="btn-num" onclick="appendNum('2')">2</button>
    <button class="btn-num" onclick="appendNum('3')">3</button>
    <button class="btn-op" onclick="chooseOp('+')">+</button>

    <!-- row 5 -->
    <button class="btn-num btn-zero" onclick="appendNum('0')">0</button>
    <button class="btn-num" onclick="appendDot()">.</button>
    <button class="btn-eq" onclick="calculate()">=</button>
  </div>
</div>

<script>
  var current = '0';
  var previous = '';
  var operator = '';
  var freshResult = false;

  var display = document.getElementById('current');
  var history = document.getElementById('history');

  function updateDisplay() {
    display.textContent = current;
  }

  function appendNum(num) {
    if (freshResult) {
      current = num;
      freshResult = false;
    } else {
      if (current === '0') {
        current = num;
      } else {
        if (current.length < 12) {
          current = current + num;
        }
      }
    }
    updateDisplay();
  }

  function appendDot() {
    if (freshResult) {
      current = '0.';
      freshResult = false;
      updateDisplay();
      return;
    }
    if (current.indexOf('.') === -1) {
      current = current + '.';
      updateDisplay();
    }
  }

  function chooseOp(op) {
    if (operator !== '' && !freshResult) {
      calculate();
    }
    previous = current;
    operator = op;
    freshResult = true;

    var symbol = op;
    if (op === '*') symbol = '×';
    if (op === '/') symbol = '÷';
    if (op === '-') symbol = '−';

    history.textContent = previous + ' ' + symbol;
  }

  function calculate() {
    if (operator === '' || previous === '') return;

    var a = parseFloat(previous);
    var b = parseFloat(current);
    var result = 0;

    if (operator === '+') {
      result = a + b;
    } else if (operator === '-') {
      result = a - b;
    } else if (operator === '*') {
      result = a * b;
    } else if (operator === '/') {
      if (b === 0) {
        current = 'Error';
        history.textContent = '';
        operator = '';
        previous = '';
        updateDisplay();
        return;
      } else {
        result = a / b;
      }
    }

    var symbol = operator;
    if (operator === '*') symbol = '×';
    if (operator === '/') symbol = '÷';
    if (operator === '-') symbol = '−';

    history.textContent = previous + ' ' + symbol + ' ' + current + ' =';

    // round to avoid floating point weirdness like 0.1+0.2
    result = parseFloat(result.toFixed(10));

    current = String(result);
    operator = '';
    previous = '';
    freshResult = true;
    updateDisplay();
  }

  function clearAll() {
    current = '0';
    previous = '';
    operator = '';
    freshResult = false;
    history.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    if (current !== '0' && current !== 'Error') {
      if (current.charAt(0) === '-') {
        current = current.slice(1);
      } else {
        current = '-' + current;
      }
      updateDisplay();
    }
  }

  function percent() {
    if (current !== 'Error') {
      var val = parseFloat(current) / 100;
      current = String(parseFloat(val.toFixed(10)));
      updateDisplay();
    }
  }

  // keyboard support
  document.addEventListener('keydown', function(e) {
    if (e.key >= '0' && e.key <= '9') appendNum(e.key);
    else if (e.key === '.') appendDot();
    else if (e.key === '+') chooseOp('+');
    else if (e.key === '-') chooseOp('-');
    else if (e.key === '*') chooseOp('*');
    else if (e.key === '/') { e.preventDefault(); chooseOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
    else if (e.key === 'Backspace') {
      if (current.length > 1) {
        current = current.slice(0, -1);
      } else {
        current = '0';
      }
      updateDisplay();
    }
  });
</script>

</body>
</html>
